defaults:
  - _self_  # refers to this config file
  - sharding: oloop-fsdp  # refers to sharding/llama-fsdp.yaml
  - remat: llama-scan-offload  # refers to remat/llama-scan.yaml


# Used to import the model from this class
# should contain the path within the model folder and the class name
type: oloop.OLoopModel

# HuggingFace URL of the checkpoint to load, or null if initializing from scratch
pretrained_url: null
# Step of the checkpoint to load
pretrained_step: null
# Whether to strictly enforce that the keys in the checkpoint match the model state dict
pretrained_strict: null


# dtype of the model parameters. Should probably be float32
torch_dtype: float32


# vocab information
vocab_size: 128256
bos_token_id: 128000
eos_token_id: 128001
pad_token_id: -100

# architecture size
hidden_size: 128
num_hidden_layers: 5

# attention configuration
num_attention_heads: 4
num_key_value_heads: 2

# MLP configuration
intermediate_size: 256
hidden_act: silu

# rope configuration
max_position_embeddings: 131072
rope_theta: 500000.0
rope_scaling:
  factor: 32.0
  high_freq_factor: 4.0
  low_freq_factor: 1.0
  original_context_len: 8192

# initialization
initializer_range: 0.02

# misc
attention_dropout: false
attention_bias: false
rms_norm_eps: 1.0e-05

# choose attention_kernel from: [flash_attention, nan_safe_flash_attention, splash_attention, null]
attention_kernel: flash_attention

# List of names of classes in the module tree that are functionally pure.
pure_modules: []

# You can add any additional configuration options for your model here
# They will appear as attributes of config.model

fast_weight_rank: 64

base_lr: 1.0e-2
momentum_beta: 0.90

momentum_dtype: bfloat16
state_dtype: float32
