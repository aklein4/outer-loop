
# vvvvvvvvvv Don't forget to change this for new experiments vvvvvvvvvv
type: oloop_trainer.OLoopTrainer  # Used to import the trainer from this class

# This config is similar to the hyperparameters of GPT-3 XL which had 1.3B parameters.

# total batch size across all devices
global_batch_size: 128 # 4M tokens total

# run for N steps
max_steps: 1000000

# Save a checkpoint every N steps
checkpoint_interval: 100


# whether to autocast the forward pass and loss computation.
# currently only supports autocasting to bfloat16
use_autocast: true


# use multiple different optimizers for different parameters
multiple_optimizers:

  # weights related to the OLoop architecture
  fast:

    optimizer:
      type: muon.ScaledMuon

      kwargs:
        lr: 4.0e-4
        betas: [0.9, 0.95]
        eps: 1e-6
        weight_decay: 0.01

    lr_scheduler:
      type: warmup_stable_decay

      num_warmup_steps: 25
      kwargs:
        num_stable_steps: 1000000 # Currently never decays
        num_decay_steps: 2500
        min_lr_ratio: 0.0
        warmup_type: linear
        decay_type: linear

  # original transformer weights
  slow:

    optimizer:
      type: muon.ScaledMuon

      kwargs:
        lr: 4.0e-5
        betas: [0.9, 0.95]
        eps: 1e-6
        weight_decay: 0.01

    lr_scheduler:
      type: warmup_stable_decay

      num_warmup_steps: 25
      kwargs:
        num_stable_steps: 1000000 # Currently never decays
        num_decay_steps: 2500
        min_lr_ratio: 0.0
        warmup_type: linear
        decay_type: linear
  
  # No embeddings optimizer defined -> embeddings frozen


# Defaults to clip the L2 norm of gradients to 1.0.
# Set to null to disable gradient clipping by norm.
max_grad_norm: 1.0
# Defaults to not clip gradients by their absolute value.
# Set to a number to clip gradients by the specified max absolute value.
max_grad_value: null


# You can add any additional configuration options for your trainer here
# They will appear as attributes of config.trainer

chunk_size: 1024
